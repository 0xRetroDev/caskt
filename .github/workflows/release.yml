name: release

# Builds the desktop installers in public, on clean runners, for every tagged
# release. This is the trust anchor: the published binaries come from this
# workflow running this exact source, not from anyone's machine.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # On a tagged release, the tag is the single source of truth for the
      # version: write it into the package.json files so the built app, the
      # update metadata, and the GitHub release all carry the same number.
      # Skipped for manual runs, which build from the committed version.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/set-version.cjs "${{ github.ref_name }}"

      - name: Install dependencies
        run: npm run setup

      # Expose signing credentials to the build only when the secrets actually
      # exist. A missing secret expands to an empty string, and an empty CSC_LINK
      # makes electron-builder try to sign with a blank certificate and fail. By
      # writing each var to the environment only when it is non-empty, unsigned
      # builds succeed today, and adding the secrets later turns signing on with
      # no further changes to this workflow.
      - name: Configure code signing
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for v in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -n "${!v}" ]; then echo "$v=${!v}" >> "$GITHUB_ENV"; fi
          done

      # Windows Defender's real-time scanner stalls electron-builder's NSIS
      # compression for many minutes on the hosted runner, which looks like a
      # hang. Turning it off for the build run fixes it. Best-effort: if it can't
      # be changed, the build still proceeds (just slowly).
      - name: Speed up Windows packaging
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA\electron-builder"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\AppData\Local\Temp"
          Get-MpPreference | Select-Object DisableRealtimeMonitoring, ExclusionPath

      - name: Build app
        run: npm run build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: caskt-${{ matrix.os }}
          path: |
            desktop/out/*.exe
            desktop/out/*.dmg
            desktop/out/*.AppImage
            desktop/out/*.deb
            desktop/out/latest*.yml
            desktop/out/*.blockmap
          if-no-files-found: ignore

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ### Download Caskt

            Grab the one installer for your platform:

            - **Windows** — the `.exe`
            - **macOS** (Apple Silicon, M1 and newer) — the `-arm64.dmg`
            - **Linux** — the `.AppImage` (portable, just run it) or the `.deb`

            Once installed, Caskt keeps itself up to date. The `.yml` and `.blockmap` files below are used by the auto-updater, so you can ignore them.
          files: |
            desktop/out/*.exe
            desktop/out/*.dmg
            desktop/out/*.AppImage
            desktop/out/*.deb
            desktop/out/latest*.yml
            desktop/out/*.blockmap
          fail_on_unmatched_files: false
