name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/set-version.cjs "${{ github.ref_name }}"

      - name: Install dependencies
        run: npm run setup

      - name: Configure code signing
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for v in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -n "${!v}" ]; then echo "$v=${!v}" >> "$GITHUB_ENV"; fi
          done

      - name: Speed up Windows packaging
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Get-MpPreference | Select-Object DisableRealtimeMonitoring, ExclusionPath

      - name: Clear electron-builder cache
        if: runner.os == 'Windows'
        shell: pwsh
        run: Remove-Item -Recurse -Force "$env:LOCALAPPDATA\electron-builder\Cache" -ErrorAction SilentlyContinue

      - name: Build app
        run: npm run build
        timeout-minutes: 10

      - name: List all processes on timeout
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: Get-Process | Sort-Object CPU -Descending | Select-Object -First 20 | Format-Table -AutoSize

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: caskt-${{ matrix.os }}
          path: |
            desktop/out/*.exe
            desktop/out/*.dmg
            desktop/out/*.AppImage
            desktop/out/*.deb
            desktop/out/latest*.yml
            desktop/out/*.blockmap
          if-no-files-found: ignore

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ### Download Caskt

            Grab the one installer for your platform:

            - **Windows** — the `.exe`
            - **macOS** (Apple Silicon, M1 and newer) — the `-arm64.dmg`
            - **Linux** — the `.AppImage` (portable, just run it) or the `.deb`

            Once installed, Caskt keeps itself up to date. The `.yml` and `.blockmap` files below are used by the auto-updater, so you can ignore them.
          files: |
            desktop/out/*.exe
            desktop/out/*.dmg
            desktop/out/*.AppImage
            desktop/out/*.deb
            desktop/out/latest*.yml
            desktop/out/*.blockmap
          fail_on_unmatched_files: false