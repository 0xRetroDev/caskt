name: release

# Builds the desktop installers in public, on clean runners, for every tagged
# release. This is the trust anchor: the published binaries come from this
# workflow running this exact source, not from anyone's machine.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # On a tagged release, the tag is the single source of truth for the
      # version: write it into the package.json files so the built app, the
      # update metadata, and the GitHub release all carry the same number.
      # Skipped for manual runs, which build from the committed version.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/set-version.cjs "${{ github.ref_name }}"

      - name: Install dependencies
        run: npm run setup

      - name: Build app
        run: npm run build
        env:
          # electron-builder reads signing credentials from the environment.
          # Builds succeed unsigned when these are absent.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: caskt-${{ matrix.os }}
          path: |
            desktop/out/*.exe
            desktop/out/*.dmg
            desktop/out/*.AppImage
            desktop/out/*.deb
            desktop/out/*.yml
            desktop/out/*.blockmap
          if-no-files-found: ignore

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/out/*.exe
            desktop/out/*.dmg
            desktop/out/*.AppImage
            desktop/out/*.deb
            desktop/out/*.yml
            desktop/out/*.blockmap
          fail_on_unmatched_files: false
